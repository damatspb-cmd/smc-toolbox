<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC Toolbox XAUUSD</title>
    <!-- Chart.js & Annotation Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --buy: #3fb950;
            --sell: #f85149;
            --warn: #d2991d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 16px;
            color: var(--accent);
        }
        /* Input API */
        .api-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .api-section input {
            flex: 1 1 250px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0d1117;
            color: var(--text);
        }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: var(--accent);
            color: #fff;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button.danger { background: var(--sell); }
        button.success { background: var(--buy); }
        .status-msg { font-size: 0.9em; margin-left: 8px; }
        /* Menu */
        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .menu button {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            flex: 1 1 auto;
        }
        .menu button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        /* Dashboard cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }
        .card h3 {
            margin-bottom: 12px;
            font-size: 1.1em;
        }
        .signal-buy { color: var(--buy); font-weight: bold; }
        .signal-sell { color: var(--sell); font-weight: bold; }
        .signal-neutral { color: var(--warn); }
        /* Chart container */
        .chart-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            height: 400px;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .hidden { display: none; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 SMC Toolbox XAUUSD</h1>

    <!-- API Key Section -->
    <div class="api-section">
        <input type="text" id="apiKeyInput" placeholder="Masukkan Twelve Data API Key" autocomplete="off">
        <button id="btnFetchData" class="success">🔗 Hubungkan & Ambil Data</button>
        <button id="btnDummyData" class="danger">📦 Gunakan Data Dummy</button>
        <span id="statusMessage" class="status-msg"></span>
    </div>

    <!-- Menu Tombol Analisis -->
    <div class="menu" id="menuButtons">
        <button data-action="analisaHariIni">📅 Analisa Hari Ini</button>
        <button data-action="cariBuy">🔎 Cari Sinyal Buy</button>
        <button data-action="cariSell">🔍 Cari Sinyal Sell</button>
        <button data-action="prediksiBesok">🔮 Prediksi Besok</button>
        <button data-action="cekNews">📰 Cek News</button>
    </div>

    <!-- Dashboard Dinamis -->
    <div id="dashboard" class="grid"></div>

    <!-- Chart Mini -->
    <div class="chart-container">
        <canvas id="priceChart"></canvas>
    </div>

    <!-- Konten Tambahan (News) -->
    <div id="extraContent"></div>
</div>

<script>
    // ==================== GLOBAL STATE ====================
    const API_BASE = 'https://api.twelvedata.com';
    let marketData = {
        daily: [],   // array candle daily (timestamp, open, high, low, close)
        h1: [],
        m15: [],
        lastUpdate: null,
        symbol: 'XAU/USD'
    };
    let currentAction = 'analisaHariIni';
    let priceChart = null;

    // DOM Elements
    const apiKeyInput = document.getElementById('apiKeyInput');
    const btnFetchData = document.getElementById('btnFetchData');
    const btnDummyData = document.getElementById('btnDummyData');
    const statusMsg = document.getElementById('statusMessage');
    const dashboardDiv = document.getElementById('dashboard');
    const extraContent = document.getElementById('extraContent');
    const menuButtons = document.querySelectorAll('#menuButtons button');

    // ==================== UTILS ====================
    function showStatus(text, isError = false) {
        statusMsg.textContent = text;
        statusMsg.style.color = isError ? 'var(--sell)' : 'var(--buy)';
    }

    // Konversi timestamp Twelve Data ke epoch ms
    function parseDate(dateStr) {
        return new Date(dateStr + 'Z').getTime(); // asumsi UTC
    }

    // Format harga
    function fmtPrice(p) { return p.toFixed(2); }

    // ==================== API FETCH ====================
    async function fetchData(apiKey, useDummy = false) {
        if (useDummy) {
            // Data dummy untuk demo
            const now = Date.now();
            const dayMs = 86400000;
            marketData.daily = [
                { time: now - dayMs*2, open: 2320, high: 2340, low: 2310, close: 2335 },
                { time: now - dayMs, open: 2335, high: 2355, low: 2325, close: 2342 },
            ];
            marketData.h1 = generateDummyH1(48); // 2 hari
            marketData.m15 = generateDummyM15(96*2); // 2 hari * 96 (15min)
            marketData.lastUpdate = new Date().toISOString();
            showStatus('✅ Data dummy siap.', false);
            afterDataReady();
            return;
        }

        if (!apiKey) {
            showStatus('❌ Masukkan API key terlebih dahulu.', true);
            return;
        }

        try {
            showStatus('⏳ Mengambil data...', false);
            const [dailyRes, h1Res, m15Res] = await Promise.all([
                fetch(`${API_BASE}/time_series?symbol=XAU/USD&interval=1day&outputsize=3&apikey=${apiKey}`),
                fetch(`${API_BASE}/time_series?symbol=XAU/USD&interval=1h&outputsize=48&apikey=${apiKey}`),
                fetch(`${API_BASE}/time_series?symbol=XAU/USD&interval=15min&outputsize=192&apikey=${apiKey}`)
            ]);

            if (!dailyRes.ok || !h1Res.ok || !m15Res.ok) {
                const errMsg = (await dailyRes.json()).message || 'Gagal mengambil data. Cek API key atau kuota.';
                throw new Error(errMsg);
            }

            const dailyData = (await dailyRes.json()).values.reverse();
            const h1Data = (await h1Res.json()).values.reverse();
            const m15Data = (await m15Res.json()).values.reverse();

            marketData.daily = dailyData.map(d => ({
                time: parseDate(d.datetime),
                open: +d.open, high: +d.high, low: +d.low, close: +d.close
            }));
            marketData.h1 = h1Data.map(d => ({
                time: parseDate(d.datetime),
                open: +d.open, high: +d.high, low: +d.low, close: +d.close
            }));
            marketData.m15 = m15Data.map(d => ({
                time: parseDate(d.datetime),
                open: +d.open, high: +d.high, low: +d.low, close: +d.close
            }));
            marketData.lastUpdate = new Date().toISOString();
            showStatus('✅ Data terbaru berhasil diambil.', false);
            afterDataReady();
        } catch (err) {
            showStatus(`❌ Error: ${err.message}`, true);
        }
    }

    function generateDummyH1(count) {
        let price = 2340, data = [];
        const now = Date.now();
        for (let i = count-1; i >= 0; i--) {
            const open = price + (Math.random()-0.5)*2;
            const high = open + Math.random()*4;
            const low = open - Math.random()*4;
            const close = (high+low)/2 + (Math.random()-0.5);
            price = close;
            data.push({ time: now - i*3600000, open, high, low, close });
        }
        return data;
    }
    function generateDummyM15(count) {
        let price = 2340, data = [];
        const now = Date.now();
        for (let i = count-1; i >= 0; i--) {
            const open = price + (Math.random()-0.5)*1;
            const high = open + Math.random()*2;
            const low = open - Math.random()*2;
            const close = (high+low)/2 + (Math.random()-0.5);
            price = close;
            data.push({ time: now - i*900000, open, high, low, close });
        }
        return data;
    }

    function afterDataReady() {
        // Simpan API key jika ada
        if (apiKeyInput.value) {
            localStorage.setItem('twelveDataApiKey', apiKeyInput.value);
        }
        updateUIForAction(currentAction);
        drawChart();
    }

    // ==================== SMC LOGIC ====================
    function getPDH_PDL() {
        if (marketData.daily.length < 2) return { pdh: null, pdl: null, prevClose: null };
        const prevDay = marketData.daily[marketData.daily.length - 2]; // daily sebelumnya
        return {
            pdh: prevDay.high,
            pdl: prevDay.low,
            prevClose: prevDay.close
        };
    }

    function detectSwings(candles, leftRight = 3) {
        const swingsHigh = [];
        const swingsLow = [];
        for (let i = leftRight; i < candles.length - leftRight; i++) {
            const curr = candles[i];
            let isHigh = true, isLow = true;
            for (let j = i - leftRight; j <= i + leftRight; j++) {
                if (j === i) continue;
                if (candles[j].high >= curr.high) isHigh = false;
                if (candles[j].low <= curr.low) isLow = false;
            }
            if (isHigh) swingsHigh.push({ index: i, price: curr.high, time: curr.time });
            if (isLow) swingsLow.push({ index: i, price: curr.low, time: curr.time });
        }
        return { swingsHigh, swingsLow };
    }

    function getStructureH1() {
        const { swingsHigh, swingsLow } = detectSwings(marketData.h1, 3);
        if (swingsHigh.length < 2 || swingsLow.length < 2) return 'Ranging';
        const lastHH = swingsHigh[swingsHigh.length-1].price;
        const prevHH = swingsHigh[swingsHigh.length-2].price;
        const lastLL = swingsLow[swingsLow.length-1].price;
        const prevLL = swingsLow[swingsLow.length-2].price;
        if (lastHH > prevHH && lastLL > prevLL) return 'Uptrend (HH-HL)';
        if (lastLL < prevLL && lastHH < prevHH) return 'Downtrend (LH-LL)';
        return 'Ranging';
    }

    function getOTELevels() {
        const swings = detectSwings(marketData.h1, 3);
        if (swings.swingsHigh.length === 0 || swings.swingsLow.length === 0) return null;
        const lastHigh = swings.swingsHigh[swings.swingsHigh.length-1];
        const lastLow = swings.swingsLow[swings.swingsLow.length-1];
        const isUptrend = lastHigh.time > lastLow.time ? true : false;
        let start, end;
        if (isUptrend) {
            start = lastLow.price;
            end = lastHigh.price;
        } else {
            start = lastHigh.price;
            end = lastLow.price;
        }
        const diff = end - start;
        return {
            start, end,
            discountLow: start,
            discountHigh: start + diff * 0.5,
            premiumLow: start + diff * 0.5,
            premiumHigh: end,
            isUptrend
        };
    }

    function getActiveFVGs() {
        const fvgs = [];
        const candles = marketData.m15;
        if (candles.length < 3) return fvgs;
        for (let i = 2; i < candles.length; i++) {
            const c0 = candles[i-2], c1 = candles[i-1], c2 = candles[i];
            // Bullish FVG: low c2 > high c0
            if (c2.low > c0.high && (c1.high - c1.low) > 0) {
                fvgs.push({ type: 'bullish', top: c2.low, bottom: c0.high, timeStart: c0.time, timeEnd: c2.time, mitigated: false });
            }
            // Bearish FVG: high c2 < low c0
            if (c2.high < c0.low && (c1.high - c1.low) > 0) {
                fvgs.push({ type: 'bearish', top: c0.low, bottom: c2.high, timeStart: c0.time, timeEnd: c2.time, mitigated: false });
            }
        }
        // Tandai mitigated jika harga selanjutnya sudah masuk
        const lastCandle = candles[candles.length-1];
        fvgs.forEach(fvg => {
            if (fvg.type === 'bullish' && lastCandle.low <= fvg.top) fvg.mitigated = true;
            if (fvg.type === 'bearish' && lastCandle.high >= fvg.bottom) fvg.mitigated = true;
        });
        return fvgs.filter(f => !f.mitigated);
    }

    function checkLiquiditySweep() {
        const { pdh, pdl } = getPDH_PDL();
        if (!pdh || !pdl) return { buySweep: false, sellSweep: false };
        const recentCandles = marketData.h1.slice(-6); // 6 jam terakhir
        let buySweep = false, sellSweep = false;
        for (let c of recentCandles) {
            if (c.high > pdh && c.close < pdh) sellSweep = true;
            if (c.low < pdl && c.close > pdl) buySweep = true;
        }
        return { buySweep, sellSweep };
    }

    // ==================== UI UPDATE ====================
    function updateUIForAction(action) {
        currentAction = action;
        menuButtons.forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-action="${action}"]`)?.classList.add('active');
        extraContent.innerHTML = '';

        const { pdh, pdl } = getPDH_PDL();
        const ote = getOTELevels();
        const fvgs = getActiveFVGs();
        const sweep = checkLiquiditySweep();
        const structure = getStructureH1();
        const currentPrice = marketData.m15.length > 0 ? marketData.m15[marketData.m15.length-1].close : null;

        let html = '';
        switch (action) {
            case 'analisaHariIni':
                html = analisaHariIniHTML(pdh, pdl, ote, fvgs, structure, sweep, currentPrice);
                break;
            case 'cariBuy':
                html = cariBuyHTML(pdh, pdl, ote, fvgs, sweep, currentPrice);
                break;
            case 'cariSell':
                html = cariSellHTML(pdh, pdl, ote, fvgs, sweep, currentPrice);
                break;
            case 'prediksiBesok':
                html = prediksiBesokHTML(pdh, pdl, ote, structure);
                break;
            case 'cekNews':
                extraContent.innerHTML = `<iframe src="https://www.forexfactory.com/calendar?week=this" loading="lazy"></iframe>`;
                html = '<div class="card"><h3>📰 Kalender Forex Minggu Ini</h3></div>';
                break;
        }
        dashboardDiv.innerHTML = html;
    }

    function analisaHariIniHTML(pdh, pdl, ote, fvgs, structure, sweep, price) {
        return `
        <div class="card"><h3>📌 Bias Harian</h3>
            <p>Harga saat ini: <b>${price ? fmtPrice(price) : 'N/A'}</b></p>
            <p>PDH: <span class="signal-sell">${fmtPrice(pdh)}</span> | PDL: <span class="signal-buy">${fmtPrice(pdl)}</span></p>
            <p>Status: ${price > pdh ? '<span class="signal-buy">Bullish (di atas PDH)</span>' : (price < pdl ? '<span class="signal-sell">Bearish (di bawah PDL)</span>' : '<span class="signal-neutral">Neutral</span>')}</p>
        </div>
        <div class="card"><h3>🏗️ Struktur H1</h3><p>${structure}</p></div>
        <div class="card"><h3>🎯 Zona OTE</h3>
            ${ote ? `Discount: ${fmtPrice(ote.discountLow)} - ${fmtPrice(ote.discountHigh)} | Premium: ${fmtPrice(ote.premiumLow)} - ${fmtPrice(ote.premiumHigh)}` : 'Tidak tersedia'}
        </div>
        <div class="card"><h3>📦 FVG Aktif (M15)</h3>
            ${fvgs.length === 0 ? 'Tidak ada FVG segar' : fvgs.map(f => `<p>${f.type.toUpperCase()}: ${fmtPrice(f.bottom)} - ${fmtPrice(f.top)}</p>`).join('')}
        </div>
        <div class="card"><h3>💧 Liquidity Sweep</h3>
            <p>Sweep Buy-side: ${sweep.buySweep ? '✅' : '❌'} | Sell-side: ${sweep.sellSweep ? '✅' : '❌'}</p>
        </div>`;
    }

    function cariBuyHTML(pdh, pdl, ote, fvgs, sweep, price) {
        let valid = false;
        if (price && pdl && ote && price < ote.discountHigh && price > ote.discountLow) {
            const bullFVG = fvgs.find(f => f.type === 'bullish' && price > f.bottom && price < f.top);
            if (bullFVG && sweep.buySweep) valid = true;
        }
        return `
        <div class="card" style="border: 2px solid var(--buy);">
            <h3>🔎 Sinyal Buy</h3>
            <p>Harga di Discount Zone: ${price && ote ? (price <= ote.discountHigh ? '✅' : '❌') : '?'}</p>
            <p>FVG Bullish Aktif: ${fvgs.some(f => f.type==='bullish') ? '✅' : '❌'}</p>
            <p>Sweep Buy-side (PDL): ${sweep.buySweep ? '✅' : '❌'}</p>
            <p style="font-size:1.3em;">${valid ? '<span class="signal-buy">🔥 SETUP BUY VALID DITEMUKAN</span>' : '⏳ Belum memenuhi kriteria'}</p>
        </div>`;
    }

    function cariSellHTML(pdh, pdl, ote, fvgs, sweep, price) {
        let valid = false;
        if (price && pdh && ote && price > ote.premiumLow && price < ote.premiumHigh) {
            const bearFVG = fvgs.find(f => f.type === 'bearish' && price > f.bottom && price < f.top);
            if (bearFVG && sweep.sellSweep) valid = true;
        }
        return `
        <div class="card" style="border: 2px solid var(--sell);">
            <h3>🔍 Sinyal Sell</h3>
            <p>Harga di Premium Zone: ${price && ote ? (price >= ote.premiumLow ? '✅' : '❌') : '?'}</p>
            <p>FVG Bearish Aktif: ${fvgs.some(f => f.type==='bearish') ? '✅' : '❌'}</p>
            <p>Sweep Sell-side (PDH): ${sweep.sellSweep ? '✅' : '❌'}</p>
            <p style="font-size:1.3em;">${valid ? '<span class="signal-sell">🔥 SETUP SELL VALID DITEMUKAN</span>' : '⏳ Belum memenuhi kriteria'}</p>
        </div>`;
    }

    function prediksiBesokHTML(pdh, pdl, ote, structure) {
        const targetBuy = pdh ? pdh : '?';
        const targetSell = pdl ? pdl : '?';
        return `
        <div class="card"><h3>🔮 Potensi Target Besok</h3>
            <p>Likuiditas Buy-side (EQH/PDH): ${fmtPrice(targetBuy)}</p>
            <p>Likuiditas Sell-side (EQL/PDL): ${fmtPrice(targetSell)}</p>
            <p>Berdasarkan struktur saat ini (${structure}), waspadai kemungkinan sweep level tersebut.</p>
        </div>`;
    }

    // ==================== CHART ====================
    function drawChart() {
        const ctx = document.getElementById('priceChart').getContext('2d');
        if (priceChart) priceChart.destroy();

        const m15 = marketData.m15;
        if (m15.length === 0) return;
        const labels = m15.map(c => new Date(c.time).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}));
        const closes = m15.map(c => c.close);

        const { pdh, pdl } = getPDH_PDL();
        const ote = getOTELevels();
        const fvgs = getActiveFVGs();

        const annotations = {};
        if (pdh) annotations.pdhLine = { type: 'line', yMin: pdh, yMax: pdh, borderColor: 'rgba(248,81,73,0.8)', borderWidth: 2, label: { display: true, content: 'PDH', position: 'end' } };
        if (pdl) annotations.pdlLine = { type: 'line', yMin: pdl, yMax: pdl, borderColor: 'rgba(63,185,80,0.8)', borderWidth: 2, label: { display: true, content: 'PDL', position: 'end' } };
        if (ote) {
            annotations.ote50 = { type: 'line', yMin: ote.discountHigh, yMax: ote.discountHigh, borderColor: 'rgba(210,153,29,0.7)', borderWidth: 1, borderDash: [5,5], label: { display: true, content: '50%', position: 'start' } };
        }
        // Tambah box FVG terbaru
        if (fvgs.length > 0) {
            const lastFvg = fvgs[fvgs.length-1];
            annotations.fvgBox = {
                type: 'box',
                yMin: lastFvg.bottom,
                yMax: lastFvg.top,
                backgroundColor: lastFvg.type==='bullish' ? 'rgba(63,185,80,0.15)' : 'rgba(248,81,73,0.15)',
                borderColor: lastFvg.type==='bullish' ? 'rgba(63,185,80,0.5)' : 'rgba(248,81,73,0.5)',
                borderWidth: 1,
                label: { display: true, content: 'FVG', position: 'center' }
            };
        }

        priceChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'XAUUSD (M15 close)',
                    data: closes,
                    borderColor: '#58a6ff',
                    backgroundColor: 'transparent',
                    pointRadius: 0,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { display: true, title: { display: false } },
                    y: { beginAtZero: false }
                },
                plugins: {
                    annotation: { annotations }
                }
            }
        });
    }

    // ==================== EVENT LISTENERS ====================
    btnFetchData.addEventListener('click', () => {
        const key = apiKeyInput.value.trim();
        fetchData(key, false);
    });
    btnDummyData.addEventListener('click', () => fetchData('', true));

    menuButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            updateUIForAction(btn.dataset.action);
        });
    });

    // Cek localStorage API key
    window.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('twelveDataApiKey');
        if (savedKey) {
            apiKeyInput.value = savedKey;
            // Auto-fetch? Terserah, kita tidak auto agar tidak habis kuota. Biarkan pengguna klik.
        }
        // Jika ingin langsung dummy, bisa panggil fetchData('', true); di sini.
    });
</script>
</body>
</html>
